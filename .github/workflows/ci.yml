name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Run unit tests
        id: tests
        run: |
          ./gradlew testDebugUnitTest --no-daemon --stacktrace 2>&1 | tee test-output.txt
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Test output on failure
        if: always()
        run: |
          echo "=== Last 100 lines of test output ==="
          tail -100 test-output.txt 2>/dev/null || echo "No output file"
          echo "=== Test HTML reports ==="
          for f in app/build/reports/tests/testDebugUnitTest/classes/*.html; do
            [ -f "$f" ] || continue
            if grep -q 'class="failures"' "$f" 2>/dev/null; then
              echo "FAIL: $(basename $f)"
              sed -n '/<pre>/,/<\/pre>/p' "$f" | sed 's/<[^>]*>//g' | head -10
            fi
          done
          echo "=== End ==="

      - name: Fail if tests failed
        if: steps.tests.outputs.EXIT_CODE != '0'
        run: exit 1

      - name: Run lint
        run: ./gradlew lintDebug --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
