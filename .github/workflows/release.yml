name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.0)'
        required: true
        default: 'v1.2.0'

permissions:
  contents: write

jobs:
  release:
    name: Build & Attach APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sSLO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -qo commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest 2>/dev/null || true
          rm commandlinetools-linux-11076708_latest.zip

          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-35" "build-tools;34.0.0" "platform-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | tr -d '[:space:]' | base64 -d > deepseek-balance.jks

      - name: Write keystore.properties
        run: |
          cat > keystore.properties << 'EOF'
          storeFile=../deepseek-balance.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=deepseek
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.event.inputs.version }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building release for $TAG"

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Extract test failures
        if: always()
        run: |
          mkdir -p app/build/test-failures
          for f in app/build/test-results/testDebugUnitTest/TEST-*.xml; do
            if grep -q 'failures="[1-9]"\|errors="[1-9]"' "$f" 2>/dev/null; then
              cp "$f" app/build/test-failures/
            fi
          done
          if [ -f app/build/reports/tests/testDebugUnitTest/index.html ]; then
            cp app/build/reports/tests/testDebugUnitTest/index.html app/build/test-failures/
          fi
          echo "Failures extracted: $(ls app/build/test-failures/ 2>/dev/null | wc -l) files"

      - name: Upload test failure details
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-failures-release
          path: app/build/test-failures/
          retention-days: 7

      - name: Run lint
        run: ./gradlew lintRelease --no-daemon

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk balance-sentinel-${{ steps.version.outputs.tag }}.apk

      - name: Create Release
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          REPO="${{ github.repository }}"

          # Check if release already exists
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")

          if [ "$HTTP" = "200" ]; then
            echo "Release already exists for $TAG"
            RELEASE_ID=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/releases/tags/$TAG" | grep -o '"id": [0-9]*' | head -1 | grep -o '[0-9]*')
          else
            echo "Creating release for $TAG..."
            RESP=$(curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/releases" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"body\":\"Release $TAG\",\"draft\":false,\"prerelease\":false,\"make_latest\":\"true\"}")
            echo "Create response: $RESP"
            RELEASE_ID=$(echo "$RESP" | grep -o '"id": [0-9]*' | head -1 | grep -o '[0-9]*')
          fi

          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
          echo "Release ID: $RELEASE_ID"

      - name: Upload APK to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          REPO="${{ github.repository }}"
          RELEASE_ID="${{ steps.create_release.outputs.release_id }}"
          APK="balance-sentinel-$TAG.apk"

          echo "Uploading $APK to release $RELEASE_ID..."
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=$APK" \
            --data-binary "@$APK"
          echo "Upload done."

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: balance-sentinel-${{ steps.version.outputs.tag }}
          path: balance-sentinel-${{ steps.version.outputs.tag }}.apk
          retention-days: 90
