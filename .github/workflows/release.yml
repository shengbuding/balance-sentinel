name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      versionCode:
        description: 'Version code (integer)'
        required: true
        default: '1'

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > deepseek-balance.jks

      - name: Write keystore.properties
        run: |
          cat > keystore.properties << 'EOF'
          storeFile=deepseek-balance.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=deepseek
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Update version
        run: |
          sed -i "s/versionName = \".*\"/versionName = \"${{ github.event.inputs.version }}\"/" app/build.gradle.kts
          sed -i "s/versionCode = .*/versionCode = ${{ github.event.inputs.versionCode }}/" app/build.gradle.kts

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Build release AAB
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.event.inputs.version }}
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ github.event.inputs.version }}"

          # Build release notes from git log since last tag
          NOTES=$(git log --oneline $(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~10")..HEAD 2>/dev/null || echo "Release $VERSION")

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "$NOTES" \
            --prerelease=false \
            app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/bundle/release/app-release.aab
