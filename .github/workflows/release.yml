name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.0)'
        required: true
        default: 'v1.2.0'

permissions:
  contents: write

jobs:
  release:
    name: Build & Attach APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sSLO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -qo commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest 2>/dev/null || true
          rm commandlinetools-linux-11076708_latest.zip

          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-35" "build-tools;34.0.0" "platform-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.event.inputs.version }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building release for $TAG"

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Run lint
        run: ./gradlew lintDebug --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk balance-sentinel-${{ steps.version.outputs.tag }}.apk

      - name: Upload APK to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create release if not exists, then upload APK
          gh release view "${{ steps.version.outputs.tag }}" --repo ${{ github.repository }} 2>/dev/null \
            || gh release create "${{ steps.version.outputs.tag }}" \
                --title "${{ steps.version.outputs.tag }}" \
                --notes "Release ${{ steps.version.outputs.tag }}" \
                --repo ${{ github.repository }}
          gh release upload "${{ steps.version.outputs.tag }}" \
            balance-sentinel-${{ steps.version.outputs.tag }}.apk \
            --repo ${{ github.repository }} \
            --clobber

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: balance-sentinel-${{ steps.version.outputs.tag }}
          path: balance-sentinel-${{ steps.version.outputs.tag }}.apk
          retention-days: 90
